# 墨境·高概念网文AI创作引擎 - GitHub Actions 构建配置

name: Build Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend exe
        run: |
          mkdir -p dist/backend
          pyinstaller --onefile --name backend --distpath dist/backend backend/main.py --noconfirm

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: dist/backend/backend.exe

  build-electron:
    runs-on: windows-latest
    needs: build-backend
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: electron/resources/backend

      - name: Build Electron app
        working-directory: electron
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: electron/release/**/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
